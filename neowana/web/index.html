<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="neowana">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>neowana</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <div id="loading" style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;font-family:sans-serif;background:linear-gradient(135deg,#7c4dff,#f50057);color:white;padding:20px;text-align:center;">
    <p style="font-size:24px;font-weight:bold;">너와나</p>
    <p id="loading-text" style="margin-top:8px;">로딩 중...</p>
  </div>
  <script>
    window.addEventListener('flutter-first-frame', function() {
      var el = document.getElementById('loading');
      if (el) el.style.display = 'none';
    });
    setTimeout(function() {
      var el = document.getElementById('loading');
      var text = document.getElementById('loading-text');
      if (el && el.style.display !== 'none' && text) {
        text.innerHTML = '로딩이 느립니다.<br><br><button onclick="location.reload(true)" style="padding:12px 24px;font-size:16px;border:none;border-radius:8px;background:white;color:#7c4dff;cursor:pointer;">새로고침</button>';
      }
    }, 12000);
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
