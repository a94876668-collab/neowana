<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="neowana">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>neowana</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <div id="loader" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;font-family:sans-serif;background:linear-gradient(135deg,#7c4dff,#f50057);color:white;z-index:9999;">
    <p style="font-size:24px;font-weight:bold;">너와나</p>
    <p id="status">점검 중입니다. 내일까지 이용이 불가합니다.</p>
  </div>
  <script>
    function hideLoader() { var e=document.getElementById('loader'); if(e)e.style.display='none'; }
    function showError(msg) { var s=document.getElementById('status'); if(s)s.innerHTML=msg+'<br><button onclick="location.reload()" style="margin-top:12px;padding:10px 20px;border:none;border-radius:8px;cursor:pointer;">새로고침</button>'; }
    window.addEventListener('flutter-first-frame', hideLoader);
    window.addEventListener('error', function(e) { if(e.filename && e.filename.includes('flutter')) showError('로드 오류: '+e.message); });
    window.addEventListener('unhandledrejection', function(e) { showError('오류: '+e.reason); });
    setTimeout(function(){ var l=document.getElementById('loader'); if(l&&l.style.display!=='none') document.getElementById('status').innerHTML='점검 중입니다.<br>내일까지 이용이 불가합니다.'; }, 20000);
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
